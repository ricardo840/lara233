[phases.setup]
nixPkgs = ["nodejs_20", "npm"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan view:cache && php artisan serve --host 0.0.0.0 --port $PORT"
